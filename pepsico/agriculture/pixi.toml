[workspace]
authors = ["IRI <help@iri.columbia.edu>"]
channels = ["conda-forge"]
name = "pepsico"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.11.14,<3.13"
xarray = ">=2026.4.0,<2027"
opencv = ">=4.13.0,<5"
psycopg2 = ">=2.9.11,<3"
rasterio = ">=1.5.0,<2"
shapely = ">=2.1.2,<3"
pyyaml = ">=6.0.3,<7"
scipy = ">=1.17.1,<2"
zarr = ">=3.1.6,<4"
sqlalchemy = ">=2.0.49,<3"

[pypi-dependencies]
dash = "==3.2.0"
dash-leaflet = ">=1.1.3,<2"
dash-bootstrap-components = "==2.0.4"
dash-extensions = "==2.0.4"
dash_auth = "==2.3.0"
bcrypt = "==5.0.0"

[feature.dev.dependencies]
pytest = "*"

[environments]
default = {features = ["dev"], solve-group = "prod"}
prod = {features = [], solve-group = "prod"}
