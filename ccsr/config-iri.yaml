zoom: 2

datasets:
    
    shapes_adm:
        - name: Countries
          color: black
          sql: select adm0_code as key, adm0_name as label,
            ST_AsBinary(ST_SimplifyPreserveTopology(coarse_geom, 0.01)) as the_geom
            from g2015_2012_0
          is_checked: True
        - name: 1st_order
          color: grey
          sql: select (adm0_code, adm1_code) as key, adm1_name as label,
            ST_AsBinary(ST_SimplifyPreserveTopology(coarse_geom, 0.01)) as the_geom
            from g2015_2014_1
          is_checked: False
        - name: 2nd_order
          color: grey
          sql: select (adm0_code, adm1_code) as key, adm1_name as label,
            ST_AsBinary(ST_SimplifyPreserveTopology(coarse_geom, 0.01)) as the_geom
            from g2015_2014_2
          is_checked: False

maprooms:

    flex_fcst:

        # App set up
        - title: flex_cst_precip
          core_path: flex_fcst_precip
          forecast_path: /Data/data21/iri/FD.3
          variable: Precipitation
          y_transform: False
          method: elr # or pycpt
          var: precip
          issue_format: "%b %Y"

    terc_fcst:
        - title: terc_fcst_precip
          core_path: terc_fcst_precip
          forecast_path: /Data/data21/iri/FD/NMME_Seasonal_Forecast/Precipitation_ELR
          variable: Precipitation
          var: precip
          forecast: Seasonal
          clim: 1982-2010 before September 2021; when it becomes 1991-2020.
          issue_format: "%b %Y"
        - title: terc_fcst_temp
          core_path: terc_fcst_temp
          forecast_path: /Data/data21/iri/FD/NMME_Seasonal_Forecast/Temperature_ELR
          variable: Temperature
          var: tref
          forecast: Seasonal
          clim: 1982-2010 before September 2021; when it becomes 1991-2020.
          issue_format: "%b %Y"
        - title: terc_fcst_w_precip
          core_path: terc_fcst_w_precip
          forecast_path: /data/jingyuan/Subx_forecast/mat_weekly/MME_Subx_forecast_precip
          variable: Precipitation
          var: pr
          forecast: Weekly Seasonal
          clim: 1999-2014 before May 1, 2021; when it becomes 1999-2016.
          issue_format: "%d %b %Y"
